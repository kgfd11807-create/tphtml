<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Contact</title>
</head>
<body>
     <a href="index.html" class="ll">Page d'acceuil</a>
    <h1  >Contactez-nous</h1>
    <fieldset>
        <legend>Formulaire de contact</legend>
        <form>
            <p>
                <label >email:</label>
                <input type="email" id="" name="name" placeholder="Votre nom" required>
            </p>
             
            <p>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="30" placeholder="Votre message" required></textarea>
            </p>
            <p>
                <button type="submit">Envoyer</button>
            </p>
        </form>
    </fieldset>
</body>
</html>
